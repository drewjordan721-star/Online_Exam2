‚Äé<!DOCTYPE html><html lang="en">
‚Äé<head>
‚Äé<meta charset="UTF-8">
‚Äé<meta name="viewport" content="width=device-width, initial-scale=1.0">
‚Äé<title>Survey</title>
‚Äé<style>
‚Äébody { font-family: Arial; background:#f4f4f4; display:flex; justify-content:center; padding:20px; }
‚Äé.container { background:#fff; padding:20px; border-radius:10px; width:100%; max-width:500px; }
‚Äébutton { padding:10px 15px; border:none; border-radius:5px; cursor:pointer; }
‚Äé.next { background:blue; color:#fff; }
‚Äé.back { background:gray; color:#fff; }
‚Äé.option { padding:10px; border:1px solid #ddd; margin:5px 0; cursor:pointer; border-radius:5px; }
‚Äé.option.selected { background:#007bff; color:#fff; }
‚Äé.slider-labels { display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px; }
‚Äé</style>
‚Äé</head>
‚Äé<body><div class="container">
‚Äé  <h3 id="step"></h3>
‚Äé  <p id="question"></p>  <div id="answers"></div>  <br>
‚Äé  <button class="back" onclick="prev()">Back</button>
‚Äé  <button class="next" onclick="next()">Next</button>
‚Äé</div><script>
‚Äéconst questions = [
‚Äé{ type:"list", text:"Which of the following is not a planet?", options:["Earth","Jupiter","Mercury","Africa"]},
‚Äé{ type:"list", text:"Have you ever slept on the moon before?", options:["Yes","No","Sometimes","I plan to soon"]},
‚Äé{ type:"list", text:"Which of the following is not a day of the week?", options:["Monday","Tuesday","Wednesday","July"]},
‚Äé
‚Äé{ type:"vslider", text:"Which of these is not a fruit?", options:["Apple","Banana","Carrot","Orange"]},
‚Äé{ type:"vslider", text:"What color is the sky on a sunny day?", options:["Green","Blue","Red","Black"]},
‚Äé{ type:"vslider", text:"How many legs does a normal dog have?", options:["Two","Four","Six","Eight"]},
‚Äé
‚Äé{ type:"hslider", text:"Which of these is not something you eat with?", options:["Fork","Spoon","Knife","Shoe"]},
‚Äé{ type:"hslider", text:"What do you use to hear sounds?", options:["Eyes","Ears","Nose","Mouth"]},
‚Äé
‚Äé{ type:"list", text:"Have you ever flown to the moon without a spaceship?", options:["Yes","No","Maybe","Last week"]},
‚Äé{ type:"list", text:"Which of the following is not a continent?", options:["Africa","Asia","Europe","London"]}
‚Äé];
‚Äé
‚Äélet current = 0;
‚Äélet answers = {};
‚Äé
‚Äéfunction render() {
‚Äé  const q = questions[current];
‚Äé  document.getElementById("step").innerText = `Question ${current+1} of ${questions.length}`;
‚Äé  document.getElementById("question").innerText = q.text;
‚Äé
‚Äé  const container = document.getElementById("answers");
‚Äé  container.innerHTML = "";
‚Äé
‚Äé  if(q.type === "list"){
‚Äé    q.options.forEach((opt,i)=>{
‚Äé      const div = document.createElement("div");
‚Äé      div.className = "option" + (answers[current]===i ? " selected":"");
‚Äé      div.innerText = `${i+1}. ${opt}`;
‚Äé      div.onclick = ()=>{ answers[current]=i; render(); };
‚Äé      container.appendChild(div);
‚Äé    });
‚Äé  }
‚Äé
‚Äé  if(q.type === "hslider"){
‚Äé    const labels = document.createElement("div");
‚Äé    labels.className="slider-labels";
‚Äé    q.options.forEach(opt=>{
‚Äé      const span=document.createElement("span");
‚Äé      span.innerText=opt;
‚Äé      labels.appendChild(span);
‚Äé    });
‚Äé
‚Äé    const input = document.createElement("input");
‚Äé    input.type="range";
‚Äé    input.min=1;
‚Äé    input.max=q.options.length;
‚Äé    input.value=(answers[current]??1);
‚Äé    input.style.width="100%";
‚Äé
‚Äé    input.oninput = (e)=>{ answers[current]=Number(e.target.value); };
‚Äé
‚Äé    container.appendChild(labels);
‚Äé    container.appendChild(input);
‚Äé  }
‚Äé
‚Äé  if(q.type === "vslider"){
‚Äé    const labels = document.createElement("div");
‚Äé    q.options.forEach((opt,i)=>{
‚Äé      const div=document.createElement("div");
‚Äé      div.innerText=`${i+1}. ${opt}`;
‚Äé      labels.appendChild(div);
‚Äé    });
‚Äé
‚Äé    const input = document.createElement("input");
‚Äé    input.type="range";
‚Äé    input.min=1;
‚Äé    input.max=q.options.length;
‚Äé    input.value=(answers[current]??1);
‚Äé    input.style.transform="rotate(-90deg)";
‚Äé    input.style.marginTop="20px";
‚Äé
‚Äé    input.oninput = (e)=>{ answers[current]=Number(e.target.value); };
‚Äé
‚Äé    container.appendChild(labels);
‚Äé    container.appendChild(input);
‚Äé  }
‚Äé}
‚Äé
‚Äéfunction next(){ if(current<questions.length-1){ current++; render(); } else { alert("Submitted! Check console"); console.log(answers);} }
‚Äéfunction prev(){ if(current>0){ current--; render(); } }
‚Äé
‚Äérender();
‚Äé</script></body>
‚Äé</html>
