<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wide Multi-Format Survey</title>
    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --bg: #ffffff;
            --text: #1e293b;
            --light-gray: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Wide Layout - No small boxes */
        .survey-container {
            width: 100%;
            max-width: 1400px; 
            padding: 60px 40px;
            box-sizing: border-box;
            text-align: center;
        }

        .step { display: none; animation: fadeIn 0.4s ease-in-out; }
        .step.active { display: block; }

        h2 { font-size: 2.8rem; margin-bottom: 40px; color: var(--primary); }

        /* Questions 1-3 & 9-10: List Style */
        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .option-item {
            width: 100%;
            max-width: 800px;
            padding: 25px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.4rem;
            text-align: left;
            background: white;
        }

        .option-item:hover { border-color: var(--primary); background: #eff6ff; }
        .option-item.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* Questions 4-6: Vertical Slider */
        .vertical-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            height: 450px;
            margin: 40px 0;
        }

        .vertical-slider-box {
            height: 100%;
            width: 60px;
            position: relative;
        }

        input[type=range][orient=vertical] {
            appearance: slider-vertical;
            width: 30px;
            height: 100%;
            padding: 0 5px;
        }

        .v-labels {
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-between;
            height: 100%;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-align: left;
        }

        /* Questions 7-8: Horizontal Slider */
        .horizontal-wrapper {
            width: 80%;
            margin: 80px auto;
        }

        .horizontal-slider-box {
            width: 100%;
            position: relative;
        }

        input[type=range]:not([orient=vertical]) {
            width: 100%;
            height: 15px;
            cursor: pointer;
        }

        .h-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
        }

        .selected-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-top: 20px;
            padding: 10px;
            background: var(--light-gray);
            display: inline-block;
            border-radius: 10px;
        }

        /* Navigation Buttons */
        .nav {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
        }

        .btn {
            padding: 18px 50px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.95); }
        .btn-prev { background: #94a3b8; color: white; }
        .btn-next { background: var(--primary); color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="survey-container">
    <div id="survey-content"></div>

    <div class="nav">
        <button id="prevBtn" class="btn btn-prev" onclick="move(-1)">Previous</button>
        <button id="nextBtn" class="btn btn-next" onclick="move(1)">Next</button>
    </div>
</div>

<script>
    const questions = [
        { id: 1, q: "Which of the following is not a planet?", type: "list", options: ["Earth", "Jupiter", "Mercury", "Africa"] },
        { id: 2, q: "Have you ever slept on the moon before?", type: "list", options: ["Yes", "No", "Sometimes", "I plan to soon"] },
        { id: 3, q: "Which of the following is not a day of the week?", type: "list", options: ["Monday", "Tuesday", "Wednesday", "July"] },
        { id: 4, q: "Which of these is not a fruit?", type: "v-slider", options: ["Apple", "Banana", "Carrot", "Orange"] },
        { id: 5, q: "What color is the sky on a sunny day?", type: "v-slider", options: ["Green", "Blue", "Red", "Black"] },
        { id: 6, q: "How many legs does a normal dog have?", type: "v-slider", options: ["Two", "Four", "Six", "Eight"] },
        { id: 7, q: "Which of these is not something you eat with?", type: "h-slider", options: ["Fork", "Spoon", "Knife", "Shoe"] },
        { id: 8, q: "What do you use to hear sounds?", type: "h-slider", options: ["Eyes", "Ears", "Nose", "Mouth"] },
        { id: 9, q: "Have you ever flown to the moon without a spaceship?", type: "dropdown-list", options: ["Yes", "No", "Maybe", "Last week"] },
        { id: 10, q: "Which of the following is not a continent?", type: "dropdown-list", options: ["Africa", "Asia", "Europe", "London"] }
    ];

    let currentStep = 0;
    const answers = {};

    function render() {
        const container = document.getElementById('survey-content');
        container.innerHTML = '';
        
        const q = questions[currentStep];
        const stepDiv = document.createElement('div');
        stepDiv.className = `step active`;
        
        let html = `<h2>${q.q}</h2>`;

        if (q.type === 'list' || q.type === 'dropdown-list') {
            html += `<div class="options-list">`;
            q.options.forEach(opt => {
                const isSelected = answers[q.id] === opt;
                html += `<div class="option-item ${isSelected ? 'selected' : ''}" onclick="selectOpt(${q.id}, '${opt}')">${opt}</div>`;
            });
            html += `</div>`;
        } 
        else if (q.type === 'v-slider') {
            if (!answers[q.id]) answers[q.id] = q.options[0]; // Set default
            const idx = q.options.indexOf(answers[q.id]);
            
            html += `
            <div class="vertical-wrapper">
                <div class="vertical-slider-box">
                    <input type="range" min="0" max="3" step="1" value="${idx}" orient="vertical" 
                        oninput="handleSliderChange(${q.id}, this.value)">
                </div>
                <div class="v-labels">
                    ${q.options.map(opt => `<div>— ${opt}</div>`).join('')}
                </div>
            </div>
            <div class="selected-indicator">Selected: ${answers[q.id]}</div>`;
        }
        else if (q.type === 'h-slider') {
            if (!answers[q.id]) answers[q.id] = q.options[0]; // Set default
            const idx = q.options.indexOf(answers[q.id]);
            
            html += `
            <div class="horizontal-wrapper">
                <div class="horizontal-slider-box">
                    <input type="range" min="0" max="3" step="1" value="${idx}" 
                        oninput="handleSliderChange(${q.id}, this.value)">
                    <div class="h-labels">
                        ${q.options.map(opt => `<div>${opt}</div>`).join('')}
                    </div>
                </div>
            </div>
            <div class="selected-indicator">Selected: ${answers[q.id]}</div>`;
        }

        stepDiv.innerHTML = html;
        container.appendChild(stepDiv);

        document.getElementById('prevBtn').disabled = currentStep === 0;
        document.getElementById('nextBtn').innerText = currentStep === questions.length - 1 ? 'Finish' : 'Next';
    }

    window.handleSliderChange = (qId, valIndex) => {
        const question = questions.find(q => q.id === qId);
        answers[qId] = question.options[parseInt(valIndex)];
        render(); 
    };

    window.selectOpt = (qId, val) => {
        answers[qId] = val;
        render();
    };

    window.move = (n) => {
        if (n === 1 && !answers[questions[currentStep].id]) {
            alert("Please select an answer to continue.");
            return;
        }
        currentStep += n;
        if (currentStep >= questions.length) {
            document.getElementById('survey-content').innerHTML = `
                <h2>Survey Complete!</h2>
                <p style="font-size:1.5rem">Thank you for your responses.</p>
            `;
            document.querySelector('.nav').style.display = 'none';
            console.log("Final Data:", answers);
            return;
        }
        render();
    };

    render();
</script>

</body>
</html>
